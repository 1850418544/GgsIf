[pytest]
testpaths = testcases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = 
    -v
    --tb=short
    --strict-markers
    --alluredir=reports/allure-results
    --clean-alluredir

markers =
    smoke: 冒烟测试用例
    regression: 回归测试用例
    feature: 功能测试
    story: 用户故事
    critical: 关键测试用例

log_cli = false
log_cli_level = INFO
log_file = logs/pytest.log
log_file_level = DEBUG

filterwarnings =
    ignore::DeprecationWarning
